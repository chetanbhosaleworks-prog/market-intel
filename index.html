<!DOCTYPE html>
<html class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Market Intel — AI Market Research Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<style>
:root{
 --background:210 25% 98%;--foreground:222 30% 12%;--card:0 0% 100%;
 --primary:221 83% 53%;--primary-foreground:0 0% 100%;
 --secondary:214 25% 94%;--muted-foreground:220 12% 44%;
 --accent:221 100% 96%;--accent-foreground:221 72% 42%;
 --border:216 20% 88%;--input:216 20% 86%;
 --price:221 83% 53%;--positive:145 65% 40%;--negative:0 74% 52%;
 --warning:36 92% 46%;--cyan:191 90% 38%;--violet:262 70% 56%;}
.dark{
 --background:222 22% 8%;--foreground:214 20% 92%;--card:222 18% 12%;
 --primary:217 91% 62%;--primary-foreground:222 40% 10%;
 --secondary:220 15% 17%;--muted-foreground:218 12% 62%;
 --accent:220 40% 20%;--accent-foreground:214 95% 74%;
 --border:220 14% 21%;--input:220 14% 24%;
 --price:217 91% 62%;--positive:145 60% 50%;--negative:0 80% 62%;
 --warning:38 92% 56%;--cyan:191 80% 52%;--violet:262 80% 70%;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif;}
body{background:hsl(var(--background));color:hsl(var(--foreground));height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px;}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:hsl(var(--border));border-radius:5px}
.ic{width:16px;height:16px;stroke-width:2.1;flex-shrink:0}.ic-sm{width:13px;height:13px;stroke-width:2.25}.ic-lg{width:20px;height:20px;stroke-width:2}
a{color:inherit;text-decoration:none}
/* ---------- top bar ---------- */
#topbar{background:hsl(var(--card));border-bottom:1px solid hsl(var(--border));padding:0 22px;display:flex;align-items:center;gap:22px;height:58px;flex-shrink:0;}
#logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16.5px;color:hsl(var(--primary));letter-spacing:.03em;cursor:pointer;}
#mainnav{display:flex;gap:4px;height:100%;}
#mainnav button{border:none;background:transparent;color:hsl(var(--muted-foreground));font-weight:700;font-size:13.5px;
padding:0 14px;cursor:pointer;font-family:'Inter',sans-serif;height:100%;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:8px;}
#mainnav button:hover{color:hsl(var(--foreground));}
#mainnav button.active{color:hsl(var(--primary));border-bottom-color:hsl(var(--primary));}
#tright{margin-left:auto;display:flex;align-items:center;gap:10px;}
.iconbtn{width:38px;height:38px;border-radius:10px;border:1px solid hsl(var(--border));background:hsl(var(--card));
color:hsl(var(--foreground));cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
.iconbtn:hover{background:hsl(var(--secondary));}
.iconbtn .dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:9999px;background:hsl(var(--primary));}
#avatar{width:38px;height:38px;border-radius:9999px;background:hsl(var(--primary));color:hsl(var(--primary-foreground));
font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;font-size:14px;font-family:'Inter',sans-serif;}
.searchWrap{position:relative;}
.searchWrap .ic{position:absolute;left:11px;top:11px;color:hsl(var(--muted-foreground));}
.searchWrap input{background:hsl(var(--secondary));border:1px solid transparent;color:hsl(var(--foreground));border-radius:10px;
padding:9px 13px 9px 35px;font-size:13px;font-weight:700;outline:none;width:240px;font-family:'Inter',sans-serif;}
.searchWrap input:focus{border-color:hsl(var(--primary));background:hsl(var(--card));}
.sugg{position:absolute;top:44px;left:0;right:0;background:hsl(var(--card));border:1px solid hsl(var(--border));border-radius:10px;
max-height:300px;overflow-y:auto;display:none;z-index:300;box-shadow:0 14px 34px hsl(222 40% 5%/.25);}
.sugg div{padding:9px 14px;cursor:pointer;font-weight:700;font-size:13px;}
.sugg div:hover{background:hsl(var(--secondary));}
/* profile menu */
#pmenu{position:absolute;top:52px;right:0;width:230px;background:hsl(var(--card));border:1px solid hsl(var(--border));
border-radius:12px;box-shadow:0 16px 40px hsl(222 40% 5%/.3);display:none;z-index:400;overflow:hidden;}
#pmenu.open{display:block;}
#pmenu .ph{padding:13px 15px;border-bottom:1px solid hsl(var(--border));}
#pmenu .ph b{font-size:13.5px;font-weight:800;}
#pmenu .ph div{font-size:11px;color:hsl(var(--muted-foreground));margin-top:2px;}
#pmenu button{width:100%;display:flex;align-items:center;gap:10px;padding:11px 15px;border:none;background:transparent;
color:hsl(var(--foreground));font-weight:700;font-size:12.5px;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;}
#pmenu button:hover{background:hsl(var(--secondary));}
#pmenu button:disabled{color:hsl(var(--muted-foreground));cursor:default;}
#pmenu button:disabled:hover{background:transparent;}
/* ---------- content ---------- */
#content{flex:1;overflow-y:auto;}
.wrap{max-width:1180px;margin:0 auto;padding:22px 24px 40px;}
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:13px;margin-bottom:20px;}
.idxcard{border-radius:12px;border:1px solid hsl(var(--border));background:hsl(var(--card));padding:14px 16px;position:relative;overflow:hidden;}
.idxcard .n{font-size:11px;font-weight:800;letter-spacing:.08em;color:hsl(var(--muted-foreground));text-transform:uppercase;}
.idxcard .v{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:4px;}
.idxcard .c{font-size:12px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums;}
.idxcard svg{position:absolute;right:12px;bottom:12px;opacity:.85;}
.card{border-radius:12px;border:1px solid hsl(var(--border));background:hsl(var(--card));padding:18px;margin-bottom:15px;}
.card h3{font-size:11px;color:hsl(var(--muted-foreground));text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px;
font-weight:800;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
.card h3 .hint{text-transform:none;letter-spacing:0;font-weight:400;font-size:10.5px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.row31{display:grid;grid-template-columns:2.2fr 1fr;gap:15px;}
.chartbox{position:relative;height:330px;}
.chartbox.sm{height:150px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th{padding:8px 11px;text-align:left;color:hsl(var(--muted-foreground));font-weight:700;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid hsl(var(--border));}
td{padding:8.5px 11px;border-bottom:1px solid hsl(var(--border)/.5);font-variant-numeric:tabular-nums;}
td.num,th.num{text-align:right;}
tr.click{cursor:pointer;}tr.click:hover td{background:hsl(var(--secondary)/.6);}
.pos{color:hsl(var(--positive));font-weight:700}.neg{color:hsl(var(--negative));font-weight:700}
.mut{color:hsl(var(--muted-foreground))}.wrn{color:hsl(var(--warning));font-weight:700}
.sym{font-weight:800;}
.badge{border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-block;}
.b-pos{background:hsl(var(--positive)/.14);color:hsl(var(--positive))}
.b-neg{background:hsl(var(--negative)/.14);color:hsl(var(--negative))}
.b-neu{background:hsl(var(--secondary));color:hsl(var(--muted-foreground))}
.b-blue{background:hsl(var(--primary)/.13);color:hsl(var(--primary))}
/* hero (home) */
#hero{text-align:center;padding:34px 20px 10px;}
#hero h1{font-size:34px;font-weight:800;letter-spacing:-.01em;}
#hero h1 span{color:hsl(var(--primary));}
#hero p{color:hsl(var(--muted-foreground));margin-top:8px;font-size:14.5px;}
#heroSearch{margin:22px auto 6px;max-width:560px;}
#heroSearch input{width:100%;padding:14px 16px 14px 44px;font-size:15px;border-radius:14px;}
#heroSearch .ic{top:16px;left:15px;}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px;}
.chip{border:1px solid hsl(var(--border));background:hsl(var(--card));border-radius:9999px;padding:6px 15px;font-size:12px;font-weight:700;cursor:pointer;color:hsl(var(--foreground));font-family:'Inter',sans-serif;}
.chip:hover{border-color:hsl(var(--primary));color:hsl(var(--primary));}
/* news */
.newsItem{display:flex;gap:12px;padding:12px 4px;border-bottom:1px solid hsl(var(--border)/.6);align-items:flex-start;}
.newsItem:last-child{border-bottom:none;}
.newsItem .nsrc{flex-shrink:0;width:98px;font-size:10.5px;font-weight:800;color:hsl(var(--primary));text-transform:uppercase;letter-spacing:.05em;padding-top:2px;}
.newsItem .nt{font-size:13.5px;font-weight:700;line-height:1.5;}
.newsItem .nt:hover{color:hsl(var(--primary));}
.newsItem .ntime{font-size:11px;color:hsl(var(--muted-foreground));margin-top:3px;font-weight:400;}
/* stock page */
#stockHead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:16px;}
#stockHead .px{font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
#stockHead .nm{font-size:20px;font-weight:800;display:flex;align-items:center;gap:10px;}
.retchips{display:flex;gap:7px;flex-wrap:wrap;}
.retchip{border-radius:9999px;padding:5px 12px;font-size:11.5px;font-weight:800;font-variant-numeric:tabular-nums;}
.rc-pos{background:hsl(var(--positive)/.13);color:hsl(var(--positive))}
.rc-neg{background:hsl(var(--negative)/.13);color:hsl(var(--negative))}
.rc-neu{background:hsl(var(--secondary));color:hsl(var(--muted-foreground))}
.toggle{display:inline-flex;background:hsl(var(--secondary));border:1px solid hsl(var(--border));border-radius:9999px;overflow:hidden;}
.toggle button{border:none;background:transparent;color:hsl(var(--muted-foreground));font-size:11px;font-weight:800;padding:5px 14px;cursor:pointer;font-family:'Inter',sans-serif;border-radius:9999px;}
.toggle button.on{background:hsl(var(--accent));color:hsl(var(--accent-foreground));}
.narr{border-radius:12px;border:1px solid hsl(var(--primary)/.3);background:linear-gradient(150deg,hsl(var(--primary)/.09),hsl(var(--card)));
padding:17px 19px;margin-bottom:15px;font-size:14.5px;line-height:1.9;}
.narr b{color:hsl(var(--primary));font-weight:800;font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;display:flex;gap:8px;align-items:center;margin-bottom:7px;}
.tgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-bottom:15px;}
.tpanel{border-radius:12px;border:1px solid hsl(var(--border));background:hsl(var(--card));padding:16px;}
.tpanel h4{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:hsl(var(--muted-foreground));margin-bottom:11px;display:flex;align-items:center;gap:8px;}
.trow{display:flex;justify-content:space-between;padding:6px 0;font-size:12.5px;border-bottom:1px dashed hsl(var(--border)/.5);}
.trow:last-child{border-bottom:none;}
.trow .tl{color:hsl(var(--muted-foreground));font-weight:700;}
.trow .tv{font-weight:800;font-variant-numeric:tabular-nums;}
.scorebar{height:9px;border-radius:9999px;background:hsl(var(--secondary));overflow:hidden;margin-top:9px;}
.scorebar div{height:100%;border-radius:9999px;}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:hsl(var(--border));border-radius:12px;overflow:hidden;border:1px solid hsl(var(--border));}
.stat{background:hsl(var(--card));padding:12px 14px;}
.stat .sl{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:hsl(var(--muted-foreground));}
.stat .sv{font-size:15.5px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums;}
.scanbtn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:13px 16px;margin-bottom:9px;border-radius:12px;
border:1px solid hsl(var(--border));background:hsl(var(--card));cursor:pointer;font-weight:700;font-size:13.5px;color:hsl(var(--foreground));font-family:'Inter',sans-serif;}
.scanbtn:hover{background:hsl(var(--secondary));}
.scanbtn.on{border-color:hsl(var(--primary));background:hsl(var(--accent));color:hsl(var(--accent-foreground));}
.count{background:hsl(var(--primary));color:hsl(var(--primary-foreground));border-radius:9999px;padding:2px 11px;font-size:11.5px;font-weight:800;}
.pill{border-radius:10px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid hsl(var(--border));
display:inline-flex;align-items:center;gap:7px;background:hsl(var(--card));color:hsl(var(--foreground));font-family:'Inter',sans-serif;}
.pill:hover{background:hsl(var(--secondary));}
#loader{position:fixed;inset:0;background:hsl(var(--background));z-index:3000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.spin{width:38px;height:38px;border:3px solid hsl(var(--border));border-top-color:hsl(var(--primary));border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#disc{text-align:center;font-size:10.5px;color:hsl(var(--muted-foreground));padding:14px;border-top:1px solid hsl(var(--border));}
@media(max-width:920px){#mainnav button .lbl{display:none}.row2,.row31{grid-template-columns:1fr}.searchWrap input{width:150px}#hero h1{font-size:25px}}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><div style="color:hsl(var(--muted-foreground));font-weight:700;font-size:13px">Loading market data…</div></div>

<div id="topbar">
  <div id="logo" onclick="go('home')"><i data-lucide="radar" class="ic-lg"></i>MARKET INTEL</div>
  <div id="mainnav"></div>
  <div id="tright">
    <div class="searchWrap"><i data-lucide="search" class="ic"></i>
      <input id="search" placeholder="Search stocks…" autocomplete="off"><div class="sugg" id="sugg"></div></div>
    <button class="iconbtn" onclick="go('portfolio')" title="Portfolio"><i data-lucide="briefcase" class="ic"></i></button>
    <button class="iconbtn" onclick="go('watch')" title="Watchlist"><i data-lucide="star" class="ic"></i><span class="dot" id="wdot" style="display:none"></span></button>
    <div style="position:relative">
      <button id="avatar" onclick="toggleMenu(event)">C</button>
      <div id="pmenu">
        <div class="ph"><b>Guest</b><div id="menuAsof"></div></div>
        <button onclick="toggleTheme()"><i data-lucide="sun-moon" class="ic-sm"></i>Light / dark mode</button>
        <button onclick="go('news');toggleMenu()"><i data-lucide="newspaper" class="ic-sm"></i>Market news</button>
        <button disabled><i data-lucide="log-in" class="ic-sm"></i>Sign in — coming soon</button>
      </div>
    </div>
  </div>
</div>

<div id="content"></div>
<div id="disc">Data: NSE official EOD files · updates automatically · Educational research tool — <b>not investment advice</b>.</div>

<script>
var MARKET=null,SCANS=null,SYMBOLS=[],META=null,INDICES=[],NEWS=null,SECTORS=[],FII=null,VAL=null;
var charts={},tab='home',curStock=null,curScan=null,chartRange='1Y',scanCat='All';
var NAV=[['home','home','Home'],['market','activity','Market Overview'],['stock','line-chart','Stock Page'],
['scanner','scan-search','Scanner'],['insights','lightbulb','Insights'],['news','newspaper','News']];
function cssTok(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}
function tk(n){return 'hsl('+cssTok(n)+')';}
function tka(n,a){var p=cssTok(n).split(/\s+/);return 'hsla('+p[0]+','+p[1]+','+p[2]+','+a+')';}
function icon(n,c){return '<i data-lucide="'+n+'" class="'+(c||'ic')+'"></i>';}
function refreshIcons(){if(window.lucide)lucide.createIcons();}
function toggleTheme(){document.documentElement.classList.toggle('dark');render();}
function toggleMenu(e){if(e)e.stopPropagation();document.getElementById('pmenu').classList.toggle('open');}
document.addEventListener('click',function(e){var m=document.getElementById('pmenu');
 if(m.classList.contains('open')&&!m.contains(e.target)&&e.target.id!=='avatar')m.classList.remove('open');});
function fmtN(n){n=Number(n)||0;return n.toLocaleString('en-IN');}
function chgCls(v){return v>0?'pos':v<0?'neg':'mut';}
function chgTxt(v){return (v>0?'+':'')+Number(v).toFixed(2)+'%';}
function destroyCharts(){Object.values(charts).forEach(function(c){c.destroy()});charts={};}
function mkChart(id,cfg){var el=document.getElementById(id);if(el)charts[id]=new Chart(el,cfg);}
function card(t,i,h){return '<div class="card"><h3>'+t+(h?'<span class="hint">'+h+'</span>':'')+'</h3>'+i+'</div>';}
function nav(){document.getElementById('mainnav').innerHTML=NAV.map(function(n){
 return '<button class="'+(tab===n[0]?'active':'')+'" onclick="go(\''+n[0]+'\')">'+icon(n[1],'ic-sm')+'<span class="lbl">'+n[2]+'</span></button>';}).join('');
 refreshIcons();}
function go(t){tab=t;nav();render();document.getElementById('content').scrollTop=0;}
function spark(data,color,w,h){w=w||70;h=h||26;
 var mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),rg=(mx-mn)||1;
 var pts=data.map(function(v,i){return (i/(data.length-1)*w).toFixed(1)+','+((h-2)-(v-mn)/rg*(h-4)+1).toFixed(1);}).join(' ');
 return '<svg width="'+w+'" height="'+h+'"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.7"/></svg>';}
function timeAgo(iso){if(!iso)return '';var s=(Date.now()-new Date(iso).getTime())/1e3;
 if(s<3600)return Math.max(1,Math.round(s/60))+' min ago';if(s<86400)return Math.round(s/3600)+' hrs ago';
 return Math.round(s/86400)+' days ago';}

function stockRows(rows,cols){
 var h='<div style="overflow-x:auto"><table><tr><th>Symbol</th><th class="num">Close</th><th class="num">Chg%</th>'
  +(cols&&cols.rsi?'<th class="num">RSI</th>':'')+(cols&&cols.volx?'<th class="num">Vol×</th>':'')
  +(cols&&cols.dlv?'<th class="num">Deliv%</th>':'')+(cols&&cols.m?'<th class="num">1M%</th>':'')+'</tr>';
 rows.forEach(function(r){
  h+='<tr class="click" onclick="openStock(\''+r.symbol+'\')"><td class="sym">'+r.symbol+'</td>'
   +'<td class="num">₹'+fmtN(r.close)+'</td><td class="num '+chgCls(r.chg)+'">'+chgTxt(r.chg)+'</td>'
   +(cols&&cols.rsi?'<td class="num">'+(r.rsi==null?'—':r.rsi)+'</td>':'')
   +(cols&&cols.volx?'<td class="num">'+(r.vol_x==null?'—':r.vol_x+'x')+'</td>':'')
   +(cols&&cols.dlv?'<td class="num">'+(r.deliv==null?'—':r.deliv+'%')+'</td>':'')
   +(cols&&cols.m?'<td class="num '+chgCls(r.ret_1m)+'">'+(r.ret_1m==null?'—':chgTxt(r.ret_1m))+'</td>':'')+'</tr>';});
 return h+'</table></div>';
}
function idxCards(){
 if(!INDICES.length)return '<div class="card mut" style="font-size:12.5px">Index history is building — cards appear after two trading days of data.</div>';
 return '<div class="kgrid">'+INDICES.map(function(i){
  var vix=i.label==='INDIA VIX';
  var cls=vix?(i.chg>0?'neg':'pos'):chgCls(i.chg);
  var sc=vix?(i.chg>=0?tk('--negative'):tk('--positive')):(i.chg>=0?tk('--positive'):tk('--negative'));
  return '<div class="idxcard"><div class="n">'+i.label+(vix?' · fear gauge':'')+'</div><div class="v">'+fmtN(i.close)+'</div>'
   +'<div class="c '+cls+'">'+(i.chg>0?'+':'')+fmtN(i.chg)+' ('+chgTxt(i.chg_pct)+')</div>'
   +spark(i.spark,sc)+'</div>';}).join('')+'</div>';
}
function newsList(items,limit){
 if(!items||!items.length)return '<div class="mut" style="font-size:12.5px;padding:6px">News refresh runs on trading days — check back shortly.</div>';
 return items.slice(0,limit||40).map(function(n){
  return '<div class="newsItem"><div class="nsrc">'+n.src+'</div><div><a class="nt" href="'+n.link+'" target="_blank" rel="noopener">'+n.title+'</a>'
   +'<div class="ntime">'+timeAgo(n.ts)+'</div></div></div>';}).join('');
}

function heatTile(sc){
 var v=sc.chg_pct,a=Math.min(Math.abs(v)/2.5,1)*.55+.12;
 var bg=v>=0?'hsla('+cssTok('--positive').split(/\s+/).join(',')+','+a+')':'hsla('+cssTok('--negative').split(/\s+/).join(',')+','+a+')';
 return '<div style="background:'+bg+';border-radius:10px;padding:11px 12px;border:1px solid hsl(var(--border))">'
  +'<div style="font-size:10px;font-weight:800;letter-spacing:.06em;color:hsl(var(--foreground)/.85)">'+sc.label+'</div>'
  +'<div style="font-size:15px;font-weight:800;margin-top:3px" class="'+chgCls(v)+'">'+chgTxt(v)+'</div>'
  +(sc.wk_pct!=null?'<div style="font-size:10px;margin-top:2px" class="mut">1W '+chgTxt(sc.wk_pct)+'</div>':'')+'</div>';
}
function sectorHeatmap(){
 if(!SECTORS.length)return card('Sector Heatmap','<div class="mut" style="font-size:12.5px;padding:6px">Sector history is building — appears after two trading days.</div>');
 return card('Sector Heatmap','<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:9px">'
  +SECTORS.map(heatTile).join('')+'</div>','1-day change · sorted best to worst');
}
function fiiCard(){
 if(!FII||!FII.series||FII.series.length<2)return card('FII Index Futures — Long vs Short','<div class="mut" style="font-size:12.5px;padding:6px">Participant OI history is building — chart appears after the next daily runs.</div>');
 var f=FII.latest.fii||{};
 var kpis='<div class="kgrid" style="margin-bottom:12px">'
  +'<div class="idxcard"><div class="n">FII Long</div><div class="v pos">'+fmtN(f.long)+'</div><div class="c mut">index futures contracts</div></div>'
  +'<div class="idxcard"><div class="n">FII Short</div><div class="v neg">'+fmtN(f.short)+'</div><div class="c mut">index futures contracts</div></div>'
  +'<div class="idxcard"><div class="n">Net Position</div><div class="v '+chgCls(f.net)+'">'+(f.net>0?'+':'')+fmtN(f.net)+'</div><div class="c mut">long minus short</div></div>'
  +'<div class="idxcard"><div class="n">Long %</div><div class="v">'+(f.long_pct!=null?f.long_pct+'%':'—')+'</div><div class="c mut">'+(f.long_pct>=55?'net bullish positioning':f.long_pct<=45?'net bearish positioning':'balanced positioning')+'</div></div>'
  +'</div>';
 return kpis+card('FII Net Position — index futures, last '+FII.series.length+' sessions','<div class="chartbox"><canvas id="chF"></canvas></div>','net contracts (long − short) · as of '+FII.asof);
}
function drawFii(){
 if(!FII||!FII.series||FII.series.length<2||!document.getElementById('chF'))return;
 var dd=FII.series.map(function(p){return p.d}),nn=FII.series.map(function(p){return p.net});
 mkChart('chF',{type:'bar',data:{labels:dd,datasets:[{data:nn,
  backgroundColor:nn.map(function(v){return v>=0?tka('--positive',.7):tka('--negative',.7)}),borderRadius:2}]},
  options:{maintainAspectRatio:false,plugins:{legend:{display:false}},
  scales:{y:{ticks:{font:{size:9},callback:function(v){return Math.abs(v)>=1e5?(v/1e5).toFixed(1)+'L':fmtN(v)}},grid:{color:tka('--border',.5)}},
  x:{ticks:{font:{size:9},maxTicksLimit:10},grid:{display:false}}}}});
}
function getPort(){try{return JSON.parse(localStorage.getItem('pf')||'[]')}catch(e){return[]}}
function setPort(a){localStorage.setItem('pf',JSON.stringify(a));}
function addPos(){var sym=document.getElementById('pSym').value.trim().toUpperCase(),
 qty=parseFloat(document.getElementById('pQty').value),avg=parseFloat(document.getElementById('pAvg').value);
 if(!sym||!(qty>0)||!(avg>0)){alert('Fill symbol, quantity and buy price');return;}
 if(SYMBOLS.indexOf(sym)<0){alert(sym+' not found');return;}
 var p=getPort(),ex=p.find(function(r){return r.sym===sym});
 if(ex){var tq=ex.qty+qty;ex.avg=+(((ex.avg*ex.qty)+(avg*qty))/tq).toFixed(2);ex.qty=tq;}
 else p.push({sym:sym,qty:qty,avg:avg});
 setPort(p);render();}
function rmPos(sym){setPort(getPort().filter(function(r){return r.sym!==sym}));render();}
function loadPortRows(pf){
 Promise.all(pf.map(function(r){return fetch('data/stocks/'+r.sym+'.json').then(function(x){return x.ok?x.json():null}).catch(function(){return null})}))
 .then(function(all){
  var inv=0,cur=0,day=0;
  var h='<div style="overflow-x:auto"><table><tr><th>Symbol</th><th class="num">Qty</th><th class="num">Avg ₹</th><th class="num">LTP</th><th class="num">Invested</th><th class="num">Current</th><th class="num">P&L</th><th class="num">P&L%</th><th class="num">Day</th><th></th></tr>';
  pf.forEach(function(r,i){var s=all[i];
   if(!s){h+='<tr><td class="sym">'+r.sym+'</td><td colspan="9" class="mut">no data</td></tr>';return;}
   var ltp=s.ind.close,iv=r.qty*r.avg,cv=r.qty*ltp,pl=cv-iv,plp=iv?100*pl/iv:0,dy=cv*s.ind.chg_pct/100;
   inv+=iv;cur+=cv;day+=dy;
   h+='<tr class="click" onclick="openStock(\''+r.sym+'\')"><td class="sym">'+r.sym+'</td>'
    +'<td class="num">'+fmtN(r.qty)+'</td><td class="num">'+fmtN(r.avg)+'</td><td class="num">₹'+fmtN(ltp)+'</td>'
    +'<td class="num">₹'+fmtN(Math.round(iv))+'</td><td class="num">₹'+fmtN(Math.round(cv))+'</td>'
    +'<td class="num '+chgCls(pl)+'">'+(pl>=0?'+':'')+'₹'+fmtN(Math.round(pl))+'</td>'
    +'<td class="num '+chgCls(pl)+'">'+chgTxt(plp)+'</td>'
    +'<td class="num '+chgCls(dy)+'">'+(dy>=0?'+':'')+'₹'+fmtN(Math.round(dy))+'</td>'
    +'<td><button class="pill" onclick="event.stopPropagation();rmPos(\''+r.sym+'\')" style="padding:3px 9px">'+icon('x','ic-sm')+'</button></td></tr>';});
  var tpl=cur-inv;
  h+='<tr style="font-weight:800"><td>TOTAL</td><td></td><td></td><td></td><td class="num">₹'+fmtN(Math.round(inv))+'</td>'
   +'<td class="num">₹'+fmtN(Math.round(cur))+'</td><td class="num '+chgCls(tpl)+'">'+(tpl>=0?'+':'')+'₹'+fmtN(Math.round(tpl))+'</td>'
   +'<td class="num '+chgCls(tpl)+'">'+(inv?chgTxt(100*tpl/inv):'—')+'</td>'
   +'<td class="num '+chgCls(day)+'">'+(day>=0?'+':'')+'₹'+fmtN(Math.round(day))+'</td><td></td></tr>';
  document.getElementById('pfRows').innerHTML=h+'</table></div>';refreshIcons();
 });
}

 else if(tab==='portfolio'){

  h+='<div class="wrap">'+card('My Portfolio',
   '<div style="display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap">'
   +'<input id="pSym" placeholder="Symbol" style="background:hsl(var(--secondary));border:1px solid hsl(var(--input));color:hsl(var(--foreground));border-radius:10px;padding:8px 13px;font-weight:700;font-family:Inter;outline:none;width:130px">'
   +'<input id="pQty" placeholder="Qty" type="number" style="background:hsl(var(--secondary));border:1px solid hsl(var(--input));color:hsl(var(--foreground));border-radius:10px;padding:8px 13px;font-weight:700;font-family:Inter;outline:none;width:90px">'
   +'<input id="pAvg" placeholder="Buy price ₹" type="number" style="background:hsl(var(--secondary));border:1px solid hsl(var(--input));color:hsl(var(--foreground));border-radius:10px;padding:8px 13px;font-weight:700;font-family:Inter;outline:none;width:110px">'
   +'<button class="pill" onclick="addPos()">'+icon('plus','ic-sm')+'Add holding</button></div>'
   +'<div id="pfRows" class="mut">'+(pf.length?'Loading…':'Empty — add your holdings above. Saved only in this browser; prices are EOD.')+'</div>',
   pf.length+' holdings · EOD valuation · stored in this browser only')+'</div>';
  c.innerHTML=h;
  if(pf.length)loadPortRows(pf);
 }

 else if(tab==='watch'){
  var wl=getWatch();
  h+='<div class="wrap">'+card('My Watchlist',
   '<div style="display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap"><input id="wAdd" placeholder="Type symbol e.g. TCS" style="background:hsl(var(--secondary));border:1px solid hsl(var(--input));color:hsl(var(--foreground));border-radius:10px;padding:8px 13px;font-weight:700;font-family:Inter;outline:none">'
   +'<button class="pill" onclick="addWatch()">'+icon('plus','ic-sm')+'Add</button></div><div id="wRows" class="mut">'
   +(wl.length?'Loading…':'Empty — add symbols above, or press Watch on any stock page.')+'</div>',wl.length+' stocks · saved in this browser')+'</div>';
  c.innerHTML=h;
  if(wl.length)loadWatchRows(wl);
 }
 refreshIcons();
}
function pickScan(id){curScan=id;render();}
function pickCat(ct){scanCat=ct;
 var list=SCANS.scans.filter(function(s2){return ct==='All'||s2.cat===ct;});
 if(!list.some(function(s2){return s2.id===curScan}))curScan=list.length?list[0].id:null;
 render();}
function setRange(r){chartRange=r;render();}

// ------------------------------------------------ watchlist
function getWatch(){try{return JSON.parse(localStorage.getItem('wl')||'[]')}catch(e){return[]}}
function setWatch(a){localStorage.setItem('wl',JSON.stringify(a));}
function addWatch(){var v=document.getElementById('wAdd').value.trim().toUpperCase();
 if(!v)return;if(SYMBOLS.indexOf(v)<0){alert(v+' not found');return;}
 var w=getWatch();if(w.indexOf(v)<0){w.push(v);setWatch(w);}render();}
function rmWatch(s){setWatch(getWatch().filter(function(x){return x!==s}));render();}
function toggleWatchSym(s){var w=getWatch();
 if(w.indexOf(s)>=0)setWatch(w.filter(function(x){return x!==s}));else{w.push(s);setWatch(w);}render();}
function loadWatchRows(wl){
 Promise.all(wl.map(function(s){return fetch('data/stocks/'+s+'.json').then(function(r){return r.ok?r.json():null}).catch(function(){return null})}))
 .then(function(all){
  var h='<div style="overflow-x:auto"><table><tr><th>Symbol</th><th class="num">Close</th><th class="num">Chg%</th><th class="num">RSI</th><th class="num">1M%</th><th class="num">From 52W Hi</th><th class="num">Deliv%</th><th>Trend</th><th></th></tr>';
  all.forEach(function(s,i){
   if(!s){h+='<tr><td class="sym">'+wl[i]+'</td><td colspan="8" class="mut">no data</td></tr>';return;}
   var x=s.ind;
   h+='<tr class="click" onclick="openStock(\''+s.symbol+'\')"><td class="sym">'+s.symbol+'</td>'
    +'<td class="num">₹'+fmtN(x.close)+'</td><td class="num '+chgCls(x.chg_pct)+'">'+chgTxt(x.chg_pct)+'</td>'
    +'<td class="num">'+(x.rsi==null?'—':x.rsi)+'</td><td class="num '+chgCls(x.ret_1m)+'">'+(x.ret_1m==null?'—':chgTxt(x.ret_1m))+'</td>'
    +'<td class="num">'+x.from_hi_pct+'%</td><td class="num">'+(x.deliv==null?'—':x.deliv+'%')+'</td>'
    +'<td><span class="badge '+(x.st_dir===1?'b-pos':'b-neg')+'">'+(x.st_dir===1?'Bullish':'Bearish')+'</span></td>'
    +'<td><button class="pill" onclick="event.stopPropagation();rmWatch(\''+s.symbol+'\')" style="padding:3px 9px">'+icon('x','ic-sm')+'</button></td></tr>';});
  document.getElementById('wRows').innerHTML=h+'</table></div>';refreshIcons();
 });
}

// ------------------------------------------------ stock loading + search
function openStock(sym){
 fetch('data/stocks/'+sym+'.json').then(function(r){if(!r.ok)throw 0;return r.json()})
 .then(function(s){curStock=s;chartRange='1Y';go('stock');})
 .catch(function(){alert('No data for '+sym);});
}
function bindSearch(inputId,suggId){
 var inp=document.getElementById(inputId),sg=document.getElementById(suggId);
 if(!inp||!sg)return;
 inp.addEventListener('input',function(){
  var q=this.value.trim().toUpperCase();
  if(q.length<1){sg.style.display='none';return;}
  var hits=SYMBOLS.filter(function(s){return s.indexOf(q)===0}).slice(0,12)
   .concat(SYMBOLS.filter(function(s){return s.indexOf(q)>0}).slice(0,4));
  sg.innerHTML=hits.map(function(s){return '<div onmousedown="suggPick(\''+s+'\',\''+inputId+'\',\''+suggId+'\')">'+s+'</div>'}).join('');
  sg.style.display=hits.length?'block':'none';
 });
 inp.addEventListener('keydown',function(e){if(e.key==='Enter'){var q=this.value.trim().toUpperCase();
  var f=SYMBOLS.indexOf(q)>=0?q:SYMBOLS.find(function(s){return s.indexOf(q)===0});
  if(f)suggPick(f,inputId,suggId);}});
 inp.addEventListener('blur',function(){setTimeout(function(){sg.style.display='none';},150);});
}
function suggPick(s,inputId,suggId){
 var inp=document.getElementById(inputId),sg=document.getElementById(suggId);
 if(inp)inp.value='';if(sg)sg.style.display='none';openStock(s);}

// ------------------------------------------------ boot
function j(p){return fetch(p).then(function(r){return r.ok?r.json():null}).catch(function(){return null});}
Promise.all([j('data/market.json'),j('data/scans.json'),j('data/symbols.json'),j('data/meta.json'),
             j('data/indices.json'),j('data/news.json'),j('data/sectors.json'),j('data/fii.json'),j('data/valuation.json')])
.then(function(res){
 MARKET=res[0];SCANS=res[1];SYMBOLS=res[2]||[];META=res[3];INDICES=res[4]||[];NEWS=res[5];SECTORS=res[6]||[];FII=res[7];VAL=res[8];
 if(!MARKET||!META)throw 0;
 curScan=SCANS.scans.length?SCANS.scans[0].id:null;
 document.getElementById('loader').style.display='none';
 nav();render();bindSearch('search','sugg');
}).catch(function(){
 document.getElementById('loader').innerHTML='<div style="color:hsl(var(--negative));font-weight:700;max-width:420px;text-align:center;font-size:13px">Could not load data files.<br><br>Make sure index.html sits next to the data/ folder and the pipeline has run.</div>';
});
</script>
